name: Build Addon Zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: BigWigsMods/packager@v2
        with:
          args: -d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: BISGearCheck Build #${{ github.run_number }}
          body: |
            ## Download

            Download **BISGearCheck-*.zip** below. Do not download the "Source code" archives.

            Extract the `BISGearCheck` folder into your WoW AddOns directory:
            ```
            World of Warcraft/_anniversary_/Interface/AddOns/BISGearCheck/
            ```

            Built from `${{ github.ref_name }}` at ${{ github.sha }}.
          files: .release/*.zip
          fail_on_unmatched_files: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
