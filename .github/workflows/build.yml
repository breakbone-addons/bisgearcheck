name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: BigWigsMods/packager@v2
        with:
          args: -d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename zip and fix timestamps
        id: package
        run: |
          # Rename packager output to clean name
          for f in .release/*.zip; do
            mv "$f" .release/BiSGearCheck.zip
            break
          done

          # Extract version from the packaged TOC
          cd .release
          mkdir -p _tmp
          cd _tmp
          unzip -o ../BiSGearCheck.zip
          VERSION=$(grep '## Version:' BISGearCheck/BISGearCheck.toc | sed 's/## Version: *//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Fix file timestamps inside the zip to avoid future-dated files
          find . -exec touch -t "$(date +%Y%m%d%H%M.%S)" {} +
          zip -r ../BiSGearCheck.zip .
          cd ..
          rm -rf _tmp

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: BiSGearCheck_${{ steps.package.outputs.version }}
          body: |
            ## Download

            Download **BiSGearCheck.zip** below. Do not download the "Source code" archives.

            Extract the `BISGearCheck` folder into your WoW AddOns directory:
            ```
            World of Warcraft/_anniversary_/Interface/AddOns/BISGearCheck/
            ```

            Built from `${{ github.ref_name }}` at ${{ github.sha }}.
          files: .release/BiSGearCheck.zip
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
