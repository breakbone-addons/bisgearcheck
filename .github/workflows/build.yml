name: Build Addon Zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: BigWigsMods/packager@v2
        with:
          args: -d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List packaged files
        run: find .release -type f 2>/dev/null || echo "No .release directory found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }} (${{ github.ref_name }})
          body: |
            Manually triggered build from `${{ github.ref_name }}` at `${{ github.sha }}`.

            Download the **BISGearCheck** zip below (not the auto-generated source code archives).
          files: .release/*.zip
          fail_on_unmatched_files: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
