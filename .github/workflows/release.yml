name: Release
on:
  workflow_dispatch:
jobs:
  release:
    uses: breakbone-addons/release-workflows/.github/workflows/breakbone-release.yml@v1
    with:
      addon_name: BiSGearCheck
      budget_kb: 270
      publish: false
    secrets:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      SITE_DISPATCH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
