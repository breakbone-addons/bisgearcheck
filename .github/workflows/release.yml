name: Package and Release

on:
  push:
    tags:
      - '**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename zip and fix timestamps
        id: package
        run: |
          cd .release
          ORIG_ZIP=$(ls BiSGearCheck-*.zip)
          mkdir -p _tmp && cd _tmp
          unzip -o "../$ORIG_ZIP"
          VERSION=$(grep '## Version:' BiSGearCheck/BiSGearCheck.toc | sed 's/## Version: *//;s/\r//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          find . -exec touch -t "$(date +%Y%m%d%H%M.%S)" {} +
          ZIPNAME="BiSGearCheck-v${VERSION}-bcc.zip"
          zip -r "../$ZIPNAME" .
          cd .. && rm -rf _tmp && rm -f "$ORIG_ZIP"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BiSGearCheck v${{ steps.package.outputs.version }}-bcc
          body: |
            Download **BiSGearCheck-v${{ steps.package.outputs.version }}-bcc.zip** below.

            Extract the `BiSGearCheck` folder into:
            `World of Warcraft/_anniversary_/Interface/AddOns/BiSGearCheck/`
          files: .release/BiSGearCheck-v${{ steps.package.outputs.version }}-bcc.zip
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger site rebuild
        if: success()
        run: |
          gh api repos/breakbone-addons/breakbone-addons-site/dispatches \
            -f event_type=addon-release
        env:
          GH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
